<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/style-contact.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
    </script>
    <script type="text/javascript">
        (function () {
            emailjs.init({
                publicKey: "3ziIY9u02e9LRrJ5o",
            });
        })();
    </script>
    
</head>

<body>
    <nav>
        <ul>
            <li>
                <img class="logo" src="/assets/images/logo.jpg" alt="Logo">
            </li>
            <li><a href="#">Home</a></li>
            <li><a href="#">News</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="#">About</a></li>
            <li><button onclick="location.href='login.html'">Logout</button></li>
            <li><a href="profile.html"><img class="profile-pic" src="/assets/images/User.png" alt=""></a></li>
        </ul>
    </nav>
    <main>
        <section class="hero-section">
            <div class="hero-content">
                <h1>Get In Touch</h1>
                <p>Have a question or just want to say hi? We'd love to hear from you!</p>
            </div>
        </section>

        <section>
            <div class="main-container">
                <div class="contact-info">
                    <h1>Contact Info</h1>
                    <div class="info-item">
                        <span class="material-symbols-outlined">alternate_email</span>
                        <div>
                            <h3>Email</h3>
                            <p>support@blog.com</p>
                        </div>
                    </div>
                    <div class="info-item">
                        <span class="material-symbols-outlined">call</span>
                        <div>
                            <h3>Phone</h3>
                            <p>+962 XXXXXXXX</p>
                        </div>
                    </div>
                    <div class="info-item">
                        <span class="material-symbols-outlined">location_searching</span>
                        <div>
                            <h3>Location</h3>
                            <p>Amman, Jordan</p>
                        </div>
                    </div>
                </div>

                <div class="contact-form">
                    <h1>Contact Form</h1>
                    <form action="#" onsubmit="handleContactSubmit(event)">
                        <div class="input-group">
                            <label for="fullname">Full Name</label>
                            <input type="text" id="fullname" placeholder="Name" required>
                        </div>
                        <div class="input-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="email@mail.com" required>
                        </div>
                        <div class="input-group">
                            <label for="subject">Subject</label>
                            <input type="text" id="subject" placeholder="How can we help?" required>
                        </div>
                        <div class="input-group">
                            <label for="message">Message</label>
                            <textarea id="message" placeholder="Your message here..." required></textarea>
                        </div>
                        <button type="submit" class="submit-btn" onclick="sendMail()">
                            Send Message
                            <span class="material-symbols-outlined" >send</span>
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <span> © 2026 Blog Platform</span>
    </footer>
    <script src="/script/script.js"></script>
    <script src="/script/scriptsendmail.js"></script>
    <script src="/script/scriptvalidation.js"></script>
</body>

</html>
